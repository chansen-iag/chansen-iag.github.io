<!DOCTYPE html>
<html>
<head>
  <title>RSS Feed Example</title>
</head>
<body>
  <h1>News Digest</h1>
  </br>
  <h3>The Verge - Android</h3>
  <div id="rss-feed-verge"></div>
  <script>
    // Fetch the converted RSS feed using JavaScript
    fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.theverge.com/google/rss/index.xml') // Replace with the actual rss2json API endpoint and RSS feed URL
      .then(response => response.json())
      .then(data => {
        // Extract the necessary information from the JSON data
        var items = data.items;
        var feedContent = '';

        items.forEach(function(item) {
          var title = item.title;
          var link = item.link;
          var description = item.description;

          // Append the title and link to the feedContent variable
          feedContent += '<p><a href="' + link + '">' + title + '</a></p>';
        });

        // Display the feed content in the designated div
        document.getElementById('rss-feed-verge').innerHTML = feedContent;
      });
  </script>
  </br>
  <h3>FFXVI - Subreddit</h3>
  <div id="rss-feed-ffxvi"></div>
  <script>
    // Fetch the converted RSS feed using JavaScript
    fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.reddit.com/r/ffxvi.rss') // Replace with the actual rss2json API endpoint and RSS feed URL
      .then(response => response.json())
      .then(data => {
        // Extract the necessary information from the JSON data
        var items = data.items;
        var feedContent = '';

        items.forEach(function(item) {
          var title = item.title;
          var link = item.link;
          var description = item.description;


          // Append the title and link to the feedContent variable
          feedContent += '<p><a href="' + link + '">' + title + '</a></p></br><p>' + description + '</p>';
        });

        // Display the feed content in the designated div
        document.getElementById('rss-feed-ffxvi').innerHTML = feedContent;
      });
  </script>
</body>
</html>
