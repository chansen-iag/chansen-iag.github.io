<!DOCTYPE html>
<html>
<head>
  <title>RSS Feed Example</title>
</head>
<body>
  <h1>News Digest</h1>
  </br>
  <h3>The Verge - Android</h3>
  <div id="rss-feed-verge"></div>
  <script>
    // Fetch the converted RSS feed using JavaScript
    fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.theverge.com/google/rss/index.xml') // Replace with the actual rss2json API endpoint and RSS feed URL
      .then(response => response.json())
      .then(data => {
        // Extract the necessary information from the JSON data
        var items = data.items;
        var feedContent = '';

        items.forEach(function(item) {
          var title = item.title;
          var link = item.link;
          var description = item.description;

          // Append the title and link to the feedContent variable
          feedContent += '<button type="button" class="collapsible">' + title + '</button><div class="content"><p><a href="' + link + '">' + title + '</a></div></p><hr/>';
		    /* Style the button that is used to open and close the collapsible content */
			.collapsible {
			  background-color: #eee;
			  color: #444;
			  cursor: pointer;
			  padding: 18px;
			  width: 100%;
			  border: none;
			  text-align: left;
			  outline: none;
			  font-size: 15px;
			}

			/* Add a background color to the button if it is clicked on (add the .active class with JS), and when you move the mouse over it (hover) */
			.active, .collapsible:hover {
			  background-color: #ccc;
			}

			/* Style the collapsible content. Note: hidden by default */
			.content {
			  padding: 0 18px;
			  display: none;
			  overflow: hidden;
			  background-color: #f1f1f1;
			} 
        });

        // Display the feed content in the designated div
        document.getElementById('rss-feed-verge').innerHTML = feedContent;
      });
  </script>
  </br>
  <h3>FFXVI - Subreddit</h3>
  <div id="rss-feed-ffxvi"></div>
  <script>
    // Fetch the converted RSS feed using JavaScript
    fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.reddit.com/r/ffxvi.rss') // Replace with the actual rss2json API endpoint and RSS feed URL
      .then(response => response.json())
      .then(data => {
        // Extract the necessary information from the JSON data
        var items = data.items;
        var feedContent = '';

        items.forEach(function(item) {
          var title = item.title;
          var link = item.link;
          var description = item.description;


          // Append the title and link to the feedContent variable
          feedContent += '<p><a href="' + link + '">' + title + '</a></p></br><p>' + description + '</p><hr/>';
        });

        // Display the feed content in the designated div
        document.getElementById('rss-feed-ffxvi').innerHTML = feedContent;
      });
  </script>
</body>
</html>
