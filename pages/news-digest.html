<!DOCTYPE html>
<html>
<head>
  	<title>RSS Feed Example</title>
	<style>
		img {
			max-width:100%;
			height:auto;
		}
		.collapsible {
			background-color: #777;
			color: white;
			cursor: pointer;
			padding: 18px;
			width: 100%;
			border: none;
			text-align: left;
			outline: none;
			font-size: 15px;
		}

		.active, .collapsible:hover {
			background-color: #555;
		}

		.content {
			padding: 0 18px;
			max-height: 0;
			overflow: hidden;
			transition: max-height 0.2s ease-out;
			background-color: #f1f1f1;
		}
		.styled summary::-webkit-details-marker {
		 display: none;
		}

		.styled summary {
		 list-style: none;
		  padding: 1em;
		  cursor: default;
		  border: 1px solid;
		  background: #fafafa;
		  padding-right: 1.5em;
		  position: relative;

		  &::after {
		    content: '';
		    border-right: 4px solid;
		    border-bottom: 4px solid;
		    position: absolute;
		    right: .75em;
		    height: .75em;
		    width: .75em;
		    transform: rotate(45deg) translatey(-.1em);
		  }

		  &:focus {
		    outline: 2px solid;
		    outline-offset: 1px;
		  }
		}

		details[open].styled > summary::after {
		  transform: rotate(-135deg) translatey(-.3em);
		}

		details > div {
		  padding: 1em;
		  border: 1px solid;
		  border-top: 0;
		}

		details {
		  margin: 1em 0;
		}




		// results and non-disclosure widget styles
		body {
		  font-family: arial;
		  margin: 1.25em;
		  background: #fafafa;
		  padding: .55em;
		}

		header {
		  margin: 0 0 .75em;
		  padding-bottom: .75em;
		  border-bottom: 1px solid #aaa;

		  h1 {
		    margin: 0;
		  }

		  :last-child {
		    margin-bottom: 0;
		  }
		}

		summary h3 {
		  display: inline-block;
		  margin: 0;
		}

		h2 {
		  margin-top: 1.5em;
		  margin-bottom: .75em;
		}

		.tests {
		  max-width: 400px;
		}

		caption { text-align: left; font-size: 1.25em; margin-top: 1em;}

		.results {
		  border-top: 1px solid;
		    margin-top: 2em; 

		  table {
		    width: 100%;
		    min-width: 1100px;    
		  }
		  caption {
		    margin: 1em 0;
		  }
		  th {
		    word-break: break-word;
		    font-size: .82em;
		  }
		  th, td:not(:empty) {
		    border: 1px solid;
		    text-align: left;
		    padding: .25em;
		    min-width: 140px;
		  }
		}

		.result-tables {
		  overflow: auto;
		}

		li p {
		  margin: .5em 0;
		}

		.concern {
		  background: lightyellow;
		  font-weight: bold;
		}
	</style>
</head>
<body>
  <h1>News Digest</h1>
  </br>
  <h3>The Verge - Android</h3>
  <div id="rss-feed-verge"></div>
  <script>
    // Fetch the converted RSS feed using JavaScript
    fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.theverge.com/google/rss/index.xml') // Replace with the actual rss2json API endpoint and RSS feed URL
      .then(response => response.json())
      .then(data => {
        // Extract the necessary information from the JSON data
        var items = data.items;
        var feedContent = '';
	    
        items.forEach(function(item) {
          var title = item.title;
          var link = item.link;
          var description = item.description;
	
          // Append the title and link to the feedContent variable
          //feedContent += '<button class="collapsible">' + title + '</button><div class="content"><p><a href="' + link + '">' + title + '</a></p></div><hr/>';
	  feedContent += '<details><summary><a href="' + link + '">' + title + '</a></summary><p>' + description + '</p></details>';
        });

        // Display the feed content in the designated div
        document.getElementById('rss-feed-verge').innerHTML = feedContent;
      });
  </script>
  </br>
  <h3>FFXVI - Subreddit</h3>
  <div id="rss-feed-ffxvi"></div>
  <script>
    // Fetch the converted RSS feed using JavaScript
    fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.reddit.com/r/ffxvi.rss') // Replace with the actual rss2json API endpoint and RSS feed URL
      .then(response => response.json())
      .then(data => {
        // Extract the necessary information from the JSON data
        var items = data.items;
        var feedContent = '';

        items.forEach(function(item) {
          var title = item.title;
          var link = item.link;
          var description = item.description;


          // Append the title and link to the feedContent variable
          feedContent += '<p><a href="' + link + '">' + title + '</a></p></br><p>' + description + '</p><hr/>';
        });

        // Display the feed content in the designated div
        document.getElementById('rss-feed-ffxvi').innerHTML = feedContent;
      });
  </script>
</body>
</html>
